<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History Data</title>
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #F8FAFC;
      margin: 0;
    }
    .header {
      background: #011527;
      color: white;
      padding: 15px 20px;
    }
    .container {
      padding: 20px;
    }
    .filters {
      margin-bottom: 20px;
    }
    input, button {
      padding: 10px;
      margin-right: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #1572d2;
      color: white;
      border: none;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 12px;
    }
    th {
      background: #1572d2;
      color: white;
    }
  </style>
</head>
<body>

<div class="header">📁 History Data</div>

<div class="container">

  <div class="filters">
    <input type="date">
    <input type="date">
    <button>Filter</button>
    <button>Export CSV</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Open</th>
        <th>Close</th>
        <th>High</th>
        <th>Low</th>
        <th>Volume</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>2026-03-18</td>
        <td>50000</td>
        <td>52000</td>
        <td>53000</td>
        <td>49000</td>
        <td>1500</td>
      </tr>
    </tbody>
  </table>

</div>

</body>
</html>
